; platformio.ini — Transmissor LoRa (Heltec WiFi LoRa 32 V3)
; Placa CONFIRMADA pelos codigos de referencia (LoRaWan_APP.h, HT_SSD1306Wire.h,
; Mcu.begin(HELTEC_BOARD, SLOW_CLK_TPYE), SDA_OLED/RST_OLED, 915 MHz).

[env:transmissor]
platform = espressif32@7.0.1
framework = arduino
board = heltec_wifi_lora_32_V3
monitor_speed = 115200
; Biblioteca compartilhada do protocolo + biblioteca Heltec (versao fixada).
lib_extra_dirs = ../bibliotecas
lib_deps =
    heltecautomation/Heltec ESP32 Dev-Boards@2.1.7
; Macros que o pacote Arduino da Heltec normalmente injeta via boards.txt e que,
; sob a placa generica do PlatformIO, precisam ser definidas aqui:
;   WIFI_LORA_32_V3 -> seleciona a variante V3 (pinos do SX1262, OLED, Vext);
;   HELTEC_BOARD=30 -> codigo da placa WIFI_LORA_32_V3 (ver ESP32_Mcu.h);
;   SLOW_CLK_TPYE=0 -> fonte de clock lento interna (RC); nao dependemos de sleep.
build_flags =
    -Wall
    ; A UART com o controlador usa os pinos confirmados da Heltec:
    ; U0TXD=GPIO43 e U0RXD=GPIO44.
    ; Diagnostico serial da Heltec fica desabilitado no codigo nesta fase.
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D WIFI_LORA_32_V3=1
    -D HELTEC_BOARD=30
    -D SLOW_CLK_TPYE=0
    -D LoRaWAN_DEBUG_LEVEL=0
    -D RADIO_CHIP_SX1262
    ; Shim de compatibilidade IDF4->IDF5: o radio.c da lib Heltec usa o nome
    ; antigo GPIO_PIN_COUNT, renomeado para SOC_GPIO_PIN_COUNT no core atual.
    -D GPIO_PIN_COUNT=SOC_GPIO_PIN_COUNT
