; platformio.ini — Receptor LoRa (Heltec WiFi LoRa 32 V3)
; Mesmos parametros de radio e mesmas flags Heltec do transmissor, garantindo
; compatibilidade ponta-a-ponta (configuracao_radio.h e a fonte unica).

[env:receptor]
platform = espressif32@7.0.1
framework = arduino
board = heltec_wifi_lora_32_V3
monitor_speed = 115200
lib_extra_dirs = ../bibliotecas
lib_deps =
    heltecautomation/Heltec ESP32 Dev-Boards@2.1.7
; Ver explicacao das macros no platformio.ini do transmissor.
build_flags =
    -Wall
    -D WIFI_LORA_32_V3=1
    -D HELTEC_BOARD=30
    -D SLOW_CLK_TPYE=0
    -D LoRaWAN_DEBUG_LEVEL=0
    -D RADIO_CHIP_SX1262
    -D GPIO_PIN_COUNT=SOC_GPIO_PIN_COUNT
