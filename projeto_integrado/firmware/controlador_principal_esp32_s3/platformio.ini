; platformio.ini — Controlador principal ESP32-S3 (mestre)
; Placa ADOTADA como premissa (o "ESP8266 S3" do enunciado nao existe):
;   esp32-s3-devkitc-1  (ESP32-S3, generico). Confirme a variante fisica real.
;
; Ambientes:
;   controlador              -> firmware normal GPS + UART LoRa, sem teclado/SD
;   controlador_diagnostico  -> compila com -D MODO_DIAGNOSTICO (GNSS simulado)

[env]
platform = espressif32@7.0.1
framework = arduino
monitor_speed = 115200
; Biblioteca compartilhada do protocolo (../bibliotecas/protocolo_comunicacao).
lib_extra_dirs = ../bibliotecas
lib_deps =
    sparkfun/SparkFun Extensible Message Parser@^2.0.2
    sparkfun/SparkFun UM980 Triband RTK GNSS Arduino Library@^2.0.1
; USB CDC no boot: 'Serial' vai para a USB/JTAG nativa do ESP32-S3.
build_unflags =
    -DARDUINO_USB_MODE=0
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DHABILITAR_TECLADO=0
    -DHABILITAR_CARTAO_SD=0
    -Wall
build_src_filter =
    +<*>
    -<servico_teclado.cpp>
    -<servico_cartao_sd.cpp>

[env:controlador]
board = esp32-s3-devkitc-1

[env:controlador_diagnostico]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DMODO_DIAGNOSTICO
